<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="description" content="An immersive French language learning companion featuring AI-powered conversation practice, vocabulary flashcards, and real-time pronunciation support." />
    <title>L'Atelier Français</title>
    <style>
      /* Critical CSS for preventing blank screen */
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #FFF9F0;
      }
      /* Loading fallback */
      #root:empty::after {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        margin: 50vh auto 0;
        transform: translateY(-50%);
        border: 4px solid #EC4899;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: translateY(-50%) rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
